<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario - Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .forms-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .forms-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .form-section {
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 8px;
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            min-height: 60px;
            display: none;
            word-wrap: break-word;
        }

        .response.show {
            display: block;
        }

        .response.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .response.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .response.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .token-display {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 3px;
            margin-top: 10px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Sistema de Autenticación - Inventario</h1>

        <div class="forms-wrapper">
            <!-- Formulario de Registro -->
            <div class="form-section">
                <h2>📝 Registro</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regNombre">Nombre Completo:</label>
                        <input type="text" id="regNombre" placeholder="Juan Perez" required>
                    </div>
                    <div class="form-group">
                        <label for="regUsuario">Usuario:</label>
                        <input type="text" id="regUsuario" placeholder="juan123" required>
                    </div>
                    <div class="form-group">
                        <label for="regCorreo">Correo:</label>
                        <input type="email" id="regCorreo" placeholder="juan@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Contraseña:</label>
                        <input type="password" id="regPassword" placeholder="Pass123" required>
                    </div>
                    <button type="submit">Registrarse</button>
                </form>
                <div id="registerResponse" class="response"></div>
            </div>

            <!-- Formulario de Login -->
            <div class="form-section">
                <h2>🔑 Iniciar Sesión</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsuario">Usuario:</label>
                        <input type="text" id="loginUsuario" placeholder="juan123" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Contraseña:</label>
                        <input type="password" id="loginPassword" placeholder="Pass123" required>
                    </div>
                    <button type="submit">Iniciar Sesión</button>
                </form>
                <div id="loginResponse" class="response"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api/auth';

        // Registro
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const responseDiv = document.getElementById('registerResponse');
            
            const data = {
                nombre: document.getElementById('regNombre').value,
                usuario: document.getElementById('regUsuario').value,
                correo: document.getElementById('regCorreo').value,
                password: document.getElementById('regPassword').value
            };

            responseDiv.textContent = '⏳ Registrando...';
            responseDiv.className = 'response show loading';

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    responseDiv.className = 'response show success';
                    responseDiv.innerHTML = `
                        ✅ <strong>Registro exitoso!</strong><br>
                        Usuario: ${result.user.usuario}<br>
                        Token: <div class="token-display">${result.token}</div>
                    `;
                    document.getElementById('registerForm').reset();
                } else {
                    responseDiv.className = 'response show error';
                    responseDiv.textContent = `❌ Error: ${result.error}`;
                }
            } catch (error) {
                responseDiv.className = 'response show error';
                responseDiv.textContent = `❌ Error de conexión: ${error.message}`;
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const responseDiv = document.getElementById('loginResponse');
            
            const data = {
                usuario: document.getElementById('loginUsuario').value,
                password: document.getElementById('loginPassword').value
            };

            responseDiv.textContent = '⏳ Verificando...';
            responseDiv.className = 'response show loading';

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    responseDiv.className = 'response show success';
                    responseDiv.innerHTML = `
                        ✅ <strong>Sesión iniciada!</strong><br>
                        Bienvenido: ${result.user.nombre}<br>
                        Rol ID: ${result.user.rolId}<br>
                        Token: <div class="token-display">${result.token}</div>
                    `;
                    document.getElementById('loginForm').reset();
                } else {
                    responseDiv.className = 'response show error';
                    responseDiv.textContent = `❌ Error: ${result.error}`;
                }
            } catch (error) {
                responseDiv.className = 'response show error';
                responseDiv.textContent = `❌ Error de conexión: ${error.message}`;
            }
        });
    </script>
</body>
</html>
